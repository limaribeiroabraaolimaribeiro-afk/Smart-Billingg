<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cobranças · Smart Billing</title>
<link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/variables.css" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/layout.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/pages.css" />
</head>
<body>

<div id="page-content">
  <div class="page-section">
    <div class="section-head">
      <div>
        <h2 class="section-head__title">Cobranças</h2>
        <p class="section-head__desc">Gerencie todas as suas cobranças em um só lugar.</p>
      </div>
      <a href="cobranca-form.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Nova cobrança</span>
      </a>
    </div>

    <div class="card">
      <div class="card-pad" style="padding-bottom:0;">
        <div class="toolbar" style="margin-bottom:16px;">
          <div class="toolbar-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="f-search" placeholder="Buscar por cliente ou código (ex: SB-1004)..." />
          </div>
          <select class="filter-select" id="f-status">
            <option value="">Todos os status</option>
            <option value="pago">Pago</option>
            <option value="pendente">Pendente</option>
            <option value="atrasado">Atrasado</option>
            <option value="cancelado">Cancelado</option>
          </select>
          <select class="filter-select" id="f-period">
            <option value="">Qualquer período</option>
            <option value="7">Criadas nos últimos 7 dias</option>
            <option value="30">Criadas nos últimos 30 dias</option>
            <option value="90">Criadas nos últimos 90 dias</option>
          </select>
          <input type="date" class="filter-select" id="f-due" title="Filtrar por vencimento" style="min-width:150px;" />
          <select class="filter-select" id="f-sort">
            <option value="date-desc">Mais recentes</option>
            <option value="date-asc">Mais antigas</option>
            <option value="value-desc">Maior valor</option>
            <option value="value-asc">Menor valor</option>
            <option value="due-asc">Vencimento mais próximo</option>
          </select>
        </div>
      </div>

      <div id="list-region" class="card-pad" style="padding-top:0;">
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
      </div>

      <div class="card-pad" style="padding-top:0;" id="pagination-region"></div>
    </div>
  </div>
</div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/actions.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/cobrancas.js"></script>
</body>
</html>
