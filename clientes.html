<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Clientes · Smart Billing</title>
<link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/variables.css" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/layout.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/pages.css" />
</head>
<body>

<div id="page-content">
  <div class="page-section">
    <div class="section-head">
      <div>
        <h2 class="section-head__title">Clientes</h2>
        <p class="section-head__desc">Gerencie os clientes cadastrados no Smart Billing.</p>
      </div>
      <a href="cliente-form.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Novo cliente</span>
      </a>
    </div>

    <div class="card">
      <div class="card-pad" style="padding-bottom:0;">
        <div class="toolbar" style="margin-bottom:16px;">
          <div class="toolbar-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="f-search" placeholder="Buscar por nome, WhatsApp ou e-mail..." />
          </div>
          <select class="filter-select" id="f-sort">
            <option value="name-asc">Nome (A–Z)</option>
            <option value="recent">Cadastro mais recente</option>
            <option value="value-desc">Maior total recebido</option>
            <option value="pending-desc">Maior total pendente</option>
          </select>
        </div>
      </div>

      <div id="list-region" class="card-pad" style="padding-top:0;">
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
      </div>
    </div>
  </div>
</div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/actions.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/clientes.js"></script>
</body>
</html>
